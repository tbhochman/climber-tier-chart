# =====================================================================
# climbers.yaml — source of truth for the climber tier chart
#
# Threshold for "hard" sends (counted in volume metrics):
#   Boulder: V15 / 8C and up
#   Sport:   9a+ and up
#
# Only include sends at or above the threshold. (Lower-graded sends
# are climbing achievements but won't move the needle on a tier list
# of the world's hardest climbers.)
#
# Each send needs:
#   discipline:   "boulder" | "sport"
#   route:        Route name (string)
#   grade:        For boulder: V15..V18.   For sport: 9a+..9c+.
#   font_grade:   (boulder only, optional) e.g. 8C, 8C+, 9A, 9A+
#   year:         Year of the ascent
#   location:     Crag, Country
#   fa:           true if first ascent, false otherwise (default false)
#   style:        "redpoint" | "flash" | "onsight"
#                  Use "flash"/"onsight" sparingly — these are rare
#                  at this grade.
#
# To add a new climber: copy a block, fill in the sends list.
# To log a new send for an existing climber: append to their `sends`.
# =====================================================================

config:
  current_years: 3            # Sends within last N years count toward "Current" leaderboard
  leaderboard_size: 30        # Rows per leaderboard
  hard_threshold:
    boulder: V15              # V15 / 8C
    sport: 9a+                # 9a+

