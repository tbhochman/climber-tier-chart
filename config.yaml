config:
  leaderboard_size: 30
  current_years: 3

  # Qualifying thresholds. Sends below these grades don't count.
  thresholds:
    sport_redpoint: "9b"
    sport_flash:    "8c+"
    boulder_redpoint: "V16"
    boulder_flash:    "V14"

  # Top-N hardest sends summed for the score (per discipline).
  top_n_sends:   10
  top_n_flashes: 5

  # Flash credit multiplier on top of the redpoint score.
  flash_multiplier: 0.5

  # Per-grade points (3^x — each step = 3x the previous).
  # Sport flashes use the same scale; only the qualifying grade differs.
  sport_points:
    "8c+": 0.111   # below redpoint floor; only used for flash scoring
    "9a":  0.333
    "9a+": 1
    "9b":  3
    "9b+": 9
    "9c":  27
    "9c+": 81
  boulder_points:
    "V13": 0.333
    "8B+": 0.333
    "V14": 1
    "8C":  3
    "V15": 3
    "V16": 9
    "8C+": 9
    "V17": 27
    "9A":  27
    "V18": 81
    "9A+": 81
    "V19": 243
